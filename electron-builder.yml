appId: com.interviewbuddy.app
productName: Interview Prep Assistant
directories:
  output: release
  buildResources: build
files:
  - "dist/**/*"
  - "dist-electron/**/*"
win:
  target:
    - nsis
    - portable
  artifactName: "${productName}-Setup-${version}.${ext}"
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
